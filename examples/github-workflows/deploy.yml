name: Deploy to the edge

# Builds the site and deploys it on every push to main (including the automated
# feed-refresh and agent commits, when those are made with a token that triggers
# workflows — see ARCHITECTURE.md's GITHUB_TOKEN caveat). origin/main is the
# single source of truth: whatever is on main is what's live.
#
# Requires TWO repository secrets (Settings > Secrets and variables > Actions):
#   CLOUDFLARE_API_TOKEN   scoped to "Edit Cloudflare Workers" on your account
#   CLOUDFLARE_ACCOUNT_ID  your account id — wrangler needs it explicitly when the
#                          token can reach more than one account
# Swap the deploy step for your host (Netlify, Pages, etc.) as needed.
#
# Actions are pinned to full commit SHAs, not tags: tags are mutable and have
# been hijacked as a supply-chain foothold (CVE-2025-30066). The trailing comment
# is the human-readable version; examples/dependabot.yml bumps SHA + comment
# together so the pins never rot.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual trigger, and used by the refresh workflow

# Never run two deploys at once; queue them so the newest commit wins without
# cancelling a deploy that is already mid-upload.
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Hard cap so a hung step can never burn the 6-hour default of Actions
    # minutes. A normal build + deploy finishes in ~1-2 minutes.
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Assets-only deploy: wrangler.jsonc points `assets.directory` at ./dist,
      # so Cloudflare serves the prerendered output directly — no Worker script,
      # no @astrojs/cloudflare adapter. wrangler-action is Cloudflare's own
      # wrapper and pins the same wrangler local + CI.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
